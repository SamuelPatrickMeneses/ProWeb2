<div class="page" name="page">
    <div class="form-conteiner">
        <form action="" id="login" class="form-panel">
            <h3>Login</h3>
            <div class="input-form" >
                <input type="email" id="email" name="email" pattern="^[a-zA-Z0-9.]+@[a-zA-Z0-9]+\.[a-z]+\.([a-z]+)?$" required placeholder="Email.">
            </div>
            <div class="input-form" >
                <input type="password" id="senha" name="senha" required minlength="8" maxlength="12" placeholder="Senha.">
            </div>
            <div class="input-form" >
                <input type="submit" id="submit" name="submit" value="Login" placeholder="Repita sua senha.">
            </div>
            <div class="form-links">
                <p><a href="" class="form-link anoder-panel">Nao possui uma conta?</a></p>
                <p><a href="" class="form-link">Esqueceu sua senha?</a></p>
            </div>
        </form>
    </div>
</div>
