<div class="page" name="page">
    <div class="form-conteiner">
        <form action="" id="cadastro" class="form-panel">
            <h3>Cadastro</h3>
            <div class="input-form" >
                <input type="email" id="email" name="email" pattern="^[a-z0-9.]+@[a-z0-9]+\.[a-z]+\.([a-z]+)?$" required placeholder="Email.">
            </div>
            <div class="input-form" >
                <input type="password" id="senha" name="senha" minlength="8" maxlength="12" required placeholder="Senha.">
            </div>
            <div class="input-form" >
                <input type="password" id="senha2" name="senha2" minlength="8" maxlength="12" required placeholder="Repita sua senha.">
            </div>
            <div class="input-form" >
                <input type="submit" id="submit" name="submit"  value="Cadastro">
            </div>
            <div class="form-links">
                <p><a href="" class="form-link anoder-panel">Nao possui uma conta?</a></p>
                <p><a href="" class="form-link">Esqueceu sua senha?</a></p>
            </div>
        </form>
    </div>
</div>
